<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>교사 관리 앱</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    /* 로그인 화면 전환 애니메이션 */
    .slide-in {
      animation: slideIn 0.3s ease-out forwards;
    }
    @keyframes slideIn {
      from { transform: translateX(2rem); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    /* 숨김 처리 유틸리티 */
    .hidden-screen {
      display: none !important;
    }
  </style>
</head>
<body class="bg-gray-100 min-h-screen">
  
  <div class="min-h-screen flex items-center justify-center p-0 sm:p-4">
    <!-- 모바일 앱 스타일의 컨테이너 -->
    <div class="w-full max-w-md h-[100dvh] sm:h-[800px] bg-white sm:rounded-3xl shadow-2xl relative overflow-hidden flex flex-col">
      
      <!-- ==================== 메인 화면 ==================== -->
      <div id="main-screen" class="flex flex-col h-full bg-slate-50 w-full">
        <!-- 헤더 구역 -->
        <header class="flex justify-between items-center p-5 bg-white border-b border-gray-100 shadow-sm rounded-b-xl z-10">
          <div class="flex items-center gap-2">
            <i data-lucide="church" class="text-blue-600 w-6 h-6"></i>
            <h1 class="text-xl font-extrabold text-gray-800 tracking-tight">교사수첩</h1>
          </div>
          
          <!-- 우측 상단 마크 -->
          <div class="text-right flex flex-col items-end">
            <span class="text-[10px] font-bold text-gray-500 tracking-wider">은혜의 교회</span>
            <span class="text-sm font-extrabold text-blue-700 bg-blue-50 px-2 py-0.5 rounded-md mt-0.5">
              송도 청소년1부
            </span>
          </div>
        </header>

        <!-- 메인 컨텐츠 -->
        <main class="p-5 flex-grow flex flex-col gap-6 overflow-y-auto pb-8">
          
          <!-- 로그인 유도 배너 -->
          <div class="bg-gradient-to-r from-blue-600 to-indigo-700 rounded-2xl p-5 flex justify-between items-center shadow-md text-white">
            <div>
              <h2 class="text-lg font-bold">환영합니다, 선생님!</h2>
              <p class="text-blue-100 text-sm mt-1 font-medium">기능을 사용하시려면 로그인해주세요.</p>
            </div>
            <button 
              id="btn-go-login"
              class="bg-white/20 hover:bg-white/30 p-3 rounded-full backdrop-blur-sm transition-all duration-200"
              aria-label="로그인 페이지로 이동"
            >
              <i data-lucide="log-in" class="text-white w-6 h-6"></i>
            </button>
          </div>

          <!-- 퀵 메뉴 타이틀 -->
          <div>
            <h3 class="font-bold text-gray-800 text-lg mb-4 px-1">메뉴</h3>
            
            <!-- 4가지 아이콘 그리드 -->
            <div class="grid grid-cols-2 gap-4">
              <!-- 주소록 관리 -->
              <button class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 flex flex-col items-center justify-center gap-3 hover:shadow-md transition-shadow active:bg-gray-50">
                <div class="p-4 rounded-full bg-blue-100 text-blue-600">
                  <i data-lucide="users" class="w-8 h-8"></i>
                </div>
                <span class="font-bold text-gray-800 text-sm">주소록 관리</span>
              </button>
              
              <!-- 일정 관리 -->
              <button class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 flex flex-col items-center justify-center gap-3 hover:shadow-md transition-shadow active:bg-gray-50">
                <div class="p-4 rounded-full bg-emerald-100 text-emerald-600">
                  <i data-lucide="calendar" class="w-8 h-8"></i>
                </div>
                <span class="font-bold text-gray-800 text-sm">일정 관리</span>
              </button>
              
              <!-- 학생 관리 -->
              <button class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 flex flex-col items-center justify-center gap-3 hover:shadow-md transition-shadow active:bg-gray-50">
                <div class="p-4 rounded-full bg-amber-100 text-amber-600">
                  <i data-lucide="clipboard-edit" class="w-8 h-8"></i>
                </div>
                <span class="font-bold text-gray-800 text-sm">학생 관리</span>
              </button>
              
              <!-- 내 페이지 -->
              <button class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 flex flex-col items-center justify-center gap-3 hover:shadow-md transition-shadow active:bg-gray-50">
                <div class="p-4 rounded-full bg-purple-100 text-purple-600">
                  <i data-lucide="user-circle" class="w-8 h-8"></i>
                </div>
                <span class="font-bold text-gray-800 text-sm">내 페이지</span>
              </button>
            </div>
          </div>

          <!-- 최근 소식 / 공지사항 -->
          <div class="mt-2">
            <h3 class="font-bold text-gray-800 text-lg mb-3 px-1">공지사항</h3>
            <div class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 space-y-3">
              <div class="flex items-center gap-3">
                <span class="bg-red-100 text-red-600 text-xs font-bold px-2 py-1 rounded">필독</span>
                <p class="text-sm text-gray-700 font-medium truncate">이번 주 금요일 교사 기도회 안내</p>
              </div>
              <div class="flex items-center gap-3">
                <span class="bg-gray-100 text-gray-600 text-xs font-bold px-2 py-1 rounded">일반</span>
                <p class="text-sm text-gray-700 font-medium truncate">여름 수련회 장소 답사 결과 보고</p>
              </div>
            </div>
          </div>
        </main>
      </div>

      <!-- ==================== 로그인 화면 ==================== -->
      <div id="login-screen" class="hidden-screen flex flex-col h-full bg-white slide-in w-full absolute top-0 left-0 z-20">
        <!-- 뒤로가기 헤더 -->
        <header class="p-4 flex items-center">
          <button 
            id="btn-go-back"
            class="p-2 -ml-2 text-gray-600 hover:bg-gray-100 rounded-full transition-colors"
          >
            <i data-lucide="chevron-left" class="w-7 h-7"></i>
          </button>
        </header>

        <div class="px-8 flex flex-col justify-center flex-grow pb-20">
          <!-- 로고 및 타이틀 -->
          <div class="text-center mb-10">
            <div class="mx-auto bg-blue-50 w-20 h-20 rounded-full flex items-center justify-center mb-4">
              <i data-lucide="church" class="text-blue-600 w-10 h-10"></i>
            </div>
            <h2 class="text-3xl font-extrabold text-gray-800 mb-2">선생님 로그인</h2>
            <p class="text-gray-500 font-medium">은혜의 교회 송도 청소년1부</p>
          </div>

          <!-- 로그인 폼 -->
          <form id="login-form" class="space-y-4">
            <div>
              <label class="block text-sm font-bold text-gray-700 mb-1 ml-1">아이디</label>
              <input 
                type="text" 
                placeholder="아이디를 입력하세요" 
                class="w-full border border-gray-200 p-4 rounded-xl bg-gray-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all" 
              />
            </div>
            <div>
              <label class="block text-sm font-bold text-gray-700 mb-1 ml-1">비밀번호</label>
              <input 
                type="password" 
                placeholder="비밀번호를 입력하세요" 
                class="w-full border border-gray-200 p-4 rounded-xl bg-gray-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all" 
              />
            </div>
            
            <button 
              type="submit"
              class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold p-4 rounded-xl shadow-lg shadow-blue-200 mt-6 transition-all active:scale-[0.98]"
            >
              로그인
            </button>
          </form>

          <div class="mt-6 text-center">
            <button class="text-sm font-medium text-gray-500 hover:text-gray-800">
              비밀번호를 잊으셨나요?
            </button>
          </div>
        </div>
      </div>
      
    </div>
  </div>

  <!-- 화면 전환 로직 및 아이콘 초기화 스크립트 -->
  <script>
    // Lucide 아이콘 렌더링
    lucide.createIcons();

    // DOM 요소 가져오기
    const mainScreen = document.getElementById('main-screen');
    const loginScreen = document.getElementById('login-screen');
    const btnGoLogin = document.getElementById('btn-go-login');
    const btnGoBack = document.getElementById('btn-go-back');
    const loginForm = document.getElementById('login-form');

    // 로그인 화면으로 이동
    btnGoLogin.addEventListener('click', () => {
      loginScreen.classList.remove('hidden-screen');
      // 애니메이션 리트리거를 위해 클래스 재할당
      loginScreen.classList.remove('slide-in');
      void loginScreen.offsetWidth; // DOM 리플로우 강제
      loginScreen.classList.add('slide-in');
    });

    // 메인 화면으로 돌아가기
    btnGoBack.addEventListener('click', () => {
      loginScreen.classList.add('hidden-screen');
    });

    // 로그인 폼 제출 처리 방지 (기본 동작 막기)
    loginForm.addEventListener('submit', (e) => {
      e.preventDefault();
      // 실제 프로젝트에서는 이 곳에 서버 통신 로직이 들어갑니다.
      const msgBox = document.createElement('div');
      msgBox.className = "fixed top-5 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-4 py-2 rounded-lg shadow-lg z-50 transition-opacity duration-300";
      msgBox.innerText = "로그인 기능은 준비 중입니다.";
      document.body.appendChild(msgBox);
      
      setTimeout(() => {
        msgBox.style.opacity = '0';
        setTimeout(() => msgBox.remove(), 300);
      }, 2000);
    });
  </script>
</body>
</html>
